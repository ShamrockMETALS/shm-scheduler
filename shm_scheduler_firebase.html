<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHM Shop Scheduler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{--brand:#5D8755;--brand-dark:#3d5c38;--brand-lite:#e6f0e4;--gdark:#1A3D2B;--gmid:#2D6A4F;
--grey1:#1e1e1e;--grey2:#444;--grey3:#888;--gb:#d0d0d0;--white:#fff;--font:Arial,sans-serif;
--ns:#FAFAFA;--ns-t:#9E9E9E;--ip:#FFF8E1;--ip-t:#7D6608;--done:#EDF5EB;--done-t:#3A6B34;--hold:#FBE9E7;--hold-t:#A8361A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:#ddd;color:var(--grey1);font-size:13px;min-height:100vh;}
header{background:var(--brand);padding:0 18px;display:flex;align-items:center;justify-content:space-between;
height:58px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.25);border-bottom:3px solid var(--brand-dark);}
.hdr-left{display:flex;align-items:center;gap:14px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-logo{height:36px;object-fit:contain;}
.hdr-div{width:1.5px;height:34px;background:rgba(255,255,255,.3);}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:.8px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.2);}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.72);margin-top:1px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:none;border-radius:4px;
font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap;}
.btn:hover{opacity:.86;}.btn:active{transform:scale(.97);}
.btn-white{background:#fff;color:var(--brand-dark);}
.btn-ghost{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.4);color:#fff;}
.btn-gmid{background:var(--gmid);color:#fff;}
.btn-red{background:#b83232;color:#fff;font-size:11px;padding:5px 8px;}
.btn-active{background:#fff;color:var(--brand-dark);box-shadow:inset 0 0 0 2px var(--brand-dark);}
.sync-wrap{display:flex;align-items:center;gap:5px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.8);}
.sync-dot.on{background:#92D050;animation:pulse 2s infinite;}
.sync-dot.off{background:#ff7070;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-lbl{font-size:11px;color:rgba(255,255,255,.65);}
.cfg-strip{background:#fff;border-bottom:1px solid var(--gb);padding:9px 18px;display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap;}
.cfg-lbl{font-size:10px;font-weight:700;color:var(--grey3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px;display:block;}
.cfg-inp{border:1.5px solid var(--gb);border-radius:3px;padding:5px 8px;font-family:var(--font);font-size:13px;color:var(--grey1);background:#fafafa;}
.cfg-inp:focus{outline:2px solid var(--brand);border-color:transparent;}
.day-grp{display:flex;gap:5px;}
.day-btn{padding:5px 12px;border-radius:3px;border:1.5px solid var(--gb);background:#fafafa;font-family:var(--font);
font-size:12px;font-weight:700;cursor:pointer;color:var(--grey3);transition:all .15s;}
.day-btn.on{background:var(--gdark);color:#fff;border-color:var(--gdark);}
.cap-strip{background:var(--brand);border-bottom:2px solid var(--brand-dark);padding:6px 18px;display:flex;align-items:center;overflow-x:auto;}
.cap-strip-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.7px;text-transform:uppercase;white-space:nowrap;margin-right:10px;flex-shrink:0;}
.cap-chips{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;}
.cap-chip{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:3px;padding:3px 9px;
font-size:11px;color:#fff;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;}
.cap-chip .cn{opacity:.65;font-size:10px;}.cap-chip .cu{font-weight:700;}.cap-chip .co{opacity:.55;font-size:10px;}
.cap-chip.over{background:rgba(216,67,21,.3);border-color:rgba(216,67,21,.6);}.cap-chip.over .cu{color:#FFCCBC;}
.cap-chip.warn{background:rgba(249,168,37,.25);border-color:rgba(249,168,37,.5);}.cap-chip.warn .cu{color:#FFF8E1;}
.leg-strip{background:#f4f4f4;border-bottom:1px solid var(--gb);padding:6px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.leg-lbl{font-size:10px;font-weight:700;color:var(--grey3);text-transform:uppercase;letter-spacing:.6px;}
.pip{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 10px;border-radius:3px;border:1px solid rgba(0,0,0,.12);}
.pip-ns{background:var(--ns);color:var(--ns-t);border-color:#ccc;}.pip-ip{background:var(--ip);color:var(--ip-t);}
.pip-done{background:var(--done);color:var(--done-t);}.pip-hold{background:var(--hold);color:var(--hold-t);}
.leg-note{font-size:11px;color:var(--grey3);margin-left:6px;}
.main{padding:14px 14px 80px;}
.week-section{margin-bottom:22px;}
.week-section-hdr{background:var(--gdark);color:#fff;padding:8px 14px;border-radius:5px 5px 0 0;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;}
.week-section-hdr .wk-label{font-size:14px;letter-spacing:.6px;}
.week-section-hdr .wk-meta{opacity:.65;font-size:11px;}
.week-section-hdr .wk-cap{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:3px;padding:3px 10px;font-size:11px;}
.wk-cap-bar{background:var(--brand);padding:5px 14px;display:flex;align-items:center;overflow-x:auto;border-bottom:1px solid var(--brand-dark);}
.wk-cap-bar .cap-strip-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:.6px;text-transform:uppercase;white-space:nowrap;margin-right:8px;flex-shrink:0;}
.wk-cap-bar .cap-chips{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;}
.wk-cap-bar .cap-chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);border-radius:3px;padding:2px 7px;font-size:10px;color:#fff;display:flex;align-items:center;gap:3px;white-space:nowrap;flex-shrink:0;}
.wk-cap-bar .cap-chip .cn{opacity:.6;font-size:9px;}.wk-cap-bar .cap-chip .cu{font-weight:700;}.wk-cap-bar .cap-chip .co{opacity:.5;font-size:9px;}
.wk-cap-bar .cap-chip.over{background:rgba(180,40,40,.35);border-color:#ff9090;}.wk-cap-bar .cap-chip.over .cu{color:#ffc0c0;}
.wk-cap-bar .cap-chip.warn{background:rgba(200,160,0,.3);border-color:#ffd166;}.wk-cap-bar .cap-chip.warn .cu{color:#fff3a0;}
.tbl-wrap{background:#fff;border:1px solid var(--gb);border-top:none;border-radius:0 0 5px 5px;overflow-x:auto;box-shadow:0 2px 6px rgba(0,0,0,.08);}
table{border-collapse:collapse;width:100%;table-layout:auto;}
thead tr.th-d th{background:var(--gdark);color:#fff;text-align:center;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:7px 4px;border-right:1px solid rgba(255,255,255,.1);white-space:nowrap;}
thead tr.th-d th.th-info{background:#2a2a2a;}thead tr.th-d th.th-ttl{background:#111;}thead tr.th-d th.th-act{background:#111;width:36px;}
thead tr.th-c th{background:var(--brand-lite);color:var(--brand-dark);text-align:center;font-size:10px;font-weight:700;padding:4px 3px;border-right:1px solid #c5ddc9;border-bottom:2px solid #aacfb0;}
thead tr.th-c th.cv{color:var(--gmid);font-size:11px;}
tbody tr{border-bottom:1px solid #ebebeb;}
td{padding:0;border-right:1px solid #e5e5e5;vertical-align:middle;}td:last-child{border-right:none;}
td.info-cell{background:#fff;}
.c-lt{width:52px;min-width:52px;}.c-pr{width:100px;min-width:90px;}.c-prio{width:42px;min-width:42px;}
.c-job{width:180px;min-width:150px;}.c-wo{width:88px;min-width:78px;}.c-os{width:100px;min-width:90px;}
.c-dp{min-width:118px;}.c-ttl{width:52px;min-width:52px;}.c-act{width:36px;min-width:36px;}
.ci{width:100%;border:none;background:transparent;padding:8px 5px;font-family:var(--font);font-size:12px;color:var(--grey1);text-align:center;pointer-events:none;cursor:default;user-select:none;}
.ci-job{text-align:left;padding-left:9px;font-weight:700;font-size:13px;}
.ci-wo{font-size:12px;font-weight:600;color:var(--grey2);}.ci-pri{font-weight:700;color:var(--gdark);}
.col-hidden{display:none;}
td.dc{padding:0;}
.dr{display:flex;align-items:stretch;min-height:36px;height:100%;}
.dh{flex:0 0 46px;width:46px;border:none;background:transparent;padding:0 4px;font-family:var(--font);font-size:12px;font-weight:700;text-align:center;color:inherit;border-right:1px solid rgba(0,0,0,.12);pointer-events:none;cursor:default;user-select:none;}
.ds{flex:1;min-width:70px;border:none;background:transparent;padding:0 2px;font-family:var(--font);font-size:9px;font-weight:700;text-align:center;text-align-last:center;cursor:pointer;appearance:none;-webkit-appearance:none;color:inherit;}
.ds:focus{outline:2px solid rgba(0,0,0,.2);}
.v-ns{background:var(--ns);color:var(--ns-t);border-left:3px solid #BDBDBD;}
.v-ip{background:var(--ip);color:var(--ip-t);border-left:3px solid #F9A825;}
.v-done{background:var(--done);color:var(--done-t);border-left:3px solid #5D8755;}
.v-hold{background:var(--hold);color:var(--hold-t);border-left:3px solid #D84315;}
.v-ns,.v-ip,.v-hold,.v-done{border:none;box-shadow:none;}
/* material status colors */
.ms-cell{text-align:center;font-size:10px;font-weight:700;padding:6px 4px;white-space:nowrap;}
.ms-fmto{background:#E3EEF9;color:#2C5F9A;border-left:3px solid #4A90D9;font-weight:700;}
.ms-wait{background:#FCEAE7;color:#A83020;border-left:3px solid #D84315;font-weight:700;}
.ms-del {background:#EDF5EB;color:#3A6B34;border-left:3px solid #5D8755;font-weight:700;}
.ms-none{background:#FAFAFA;color:#BDBDBD;border-left:3px solid #E0E0E0;}
/* priority colors -- google material design */
td.pri-1{background:#FCEAE7 !important;color:#A83020;font-weight:700;border-left:3px solid #D84315;}
td.pri-2{background:#FFF3E0 !important;color:#A85B0A;font-weight:700;border-left:3px solid #EF8C1A;}
td.pri-3{background:#ECEFF1 !important;color:#546E7A;font-weight:700;border-left:3px solid #90A4AE;}
td.pri-1 .ci,td.pri-2 .ci,td.pri-3 .ci{color:inherit;font-weight:700;}
.c-ms{min-width:100px;width:100px;}
.c-ea{min-width:90px;width:90px;}
.c-sd{min-width:90px;width:90px;}
.ttl{padding:8px 5px;text-align:center;font-weight:700;font-size:13px;background:#F0F4EF;color:#2D4928;}
.act{padding:4px 4px;text-align:center;background:#f8f8f8;}
tr.tot td{background:#1C2E1A!important;color:#E8F0E6!important;font-weight:700;font-size:12px;padding:7px 5px;text-align:center;border-right:1px solid #333;}
tr.tot td.tot-lbl{text-align:right;padding-right:10px;font-size:10px;color:#888!important;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:flex-start;justify-content:center;padding:36px 16px;overflow-y:auto;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:8px;width:100%;max-width:760px;box-shadow:0 10px 50px rgba(0,0,0,.4);overflow:hidden;}
.modal-hdr{background:var(--gdark);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.modal-hdr h2{font-size:15px;font-weight:700;}
.modal-x{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;opacity:.7;line-height:1;padding:0 4px;}.modal-x:hover{opacity:1;}
.modal-body{padding:20px;}
.tabs{display:flex;border-bottom:2px solid var(--gb);margin-bottom:18px;}
.tab{padding:8px 18px;font-family:var(--font);font-size:12px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--grey3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s;}
.tab.on{color:var(--gdark);border-bottom-color:var(--gdark);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fr{display:flex;flex-direction:column;gap:4px;}
.fr label{font-size:11px;font-weight:700;color:var(--grey3);text-transform:uppercase;letter-spacing:.5px;}
.fr input,.fr select{border:1.5px solid var(--gb);border-radius:3px;padding:7px 10px;font-family:var(--font);font-size:13px;color:var(--grey1);background:#fafafa;width:100%;}
.fr input:focus,.fr select:focus{outline:2px solid var(--brand);border-color:transparent;}
.fsec{font-size:11px;font-weight:700;color:var(--gdark);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--brand-lite);}
.dhg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.factions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}
.wk-assign{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;max-height:140px;overflow-y:auto;padding:4px;}
.wk-check{display:flex;align-items:center;gap:4px;background:#f4f4f4;border:1.5px solid var(--gb);border-radius:3px;padding:4px 8px;cursor:pointer;transition:all .15s;font-size:11px;font-weight:700;}
.wk-check input{width:13px;height:13px;cursor:pointer;accent-color:var(--gdark);}
.wk-check:hover{border-color:var(--brand);background:var(--brand-lite);}
.dtbl{width:100%;border-collapse:collapse;}
.dtbl th{background:var(--brand-lite);color:var(--brand-dark);padding:7px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #c5ddc9;}
.dtbl td{padding:7px 8px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
.dtbl input[type=number]{width:62px;border:1.5px solid var(--gb);border-radius:3px;padding:5px 6px;font-family:var(--font);font-size:13px;text-align:center;}
.dtbl input:focus{outline:2px solid var(--brand);border-color:transparent;}
.sbtns{display:flex;gap:4px;}
.sbtn{padding:4px 9px;border-radius:3px;border:1.5px solid var(--gb);background:#fafafa;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;color:var(--grey3);transition:all .15s;}
.sbtn.on{background:var(--gdark);color:#fff;border-color:var(--gdark);}
.capdisplay{font-weight:700;color:var(--gmid);font-size:13px;}
.jlist{display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto;}
.jitem{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#fafafa;border:1px solid var(--gb);border-radius:4px;gap:10px;}
.jname{font-weight:700;font-size:13px;}.jsub{font-size:11px;color:var(--grey3);margin-top:2px;}
.jwks{font-size:10px;font-weight:700;color:var(--brand-dark);margin-top:3px;}
.pwscreen{display:flex;flex-direction:column;align-items:center;gap:14px;padding:32px 20px;text-align:center;}
.pwscreen h3{font-size:17px;color:var(--gdark);}.pwscreen p{font-size:12px;color:var(--grey3);}
.pwinp{border:2px solid var(--gb);border-radius:4px;padding:10px 14px;font-family:var(--font);font-size:15px;width:220px;text-align:center;letter-spacing:2px;}
.pwinp:focus{outline:2px solid var(--brand);border-color:transparent;}
.pwerr{color:#b83232;font-size:12px;font-weight:700;min-height:18px;}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--gdark);color:#fff;padding:10px 22px;border-radius:4px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .25s;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3);}
#toast.show{opacity:1;}
.loading-overlay{position:fixed;inset:0;background:rgba(26,61,43,.95);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:16px;}
.loading-overlay .spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){header{height:auto;padding:10px 12px;flex-wrap:wrap;gap:8px;}.main{padding:10px 8px 80px;}.fg{grid-template-columns:1fr;}.dhg{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<!-- REST OF HTML SAME AS ORIGINAL - ONLY APPLYING CSS CHANGES -->
</body>
</html>
