<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHM Shop Scheduler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{--brand:#5D8755;--brand-dark:#3d5c38;--brand-lite:#e6f0e4;--gdark:#1A3D2B;--gmid:#2D6A4F;
--grey1:#1e1e1e;--grey2:#444;--grey3:#888;--gb:#d0d0d0;--white:#fff;--font:Arial,sans-serif;
--ns:#ECEFF1;--ns-t:#37474F;--ip:#FFD54F;--ip-t:#5D4037;--done:#81C784;--done-t:#1B5E20;--hold:#FFB74D;--hold-t:#4E342E;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:#ddd;color:var(--grey1);font-size:13px;min-height:100vh;}
header{background:var(--brand);padding:0 18px;display:flex;align-items:center;justify-content:space-between;
height:58px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.25);border-bottom:3px solid var(--brand-dark);}
.hdr-left{display:flex;align-items:center;gap:14px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-logo{height:36px;object-fit:contain;}
.hdr-div{width:1.5px;height:34px;background:rgba(255,255,255,.3);}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:.8px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.2);}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.72);margin-top:1px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:none;border-radius:4px;
font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap;}
.btn:hover{opacity:.86;}.btn:active{transform:scale(.97);}
.btn-white{background:#fff;color:var(--brand-dark);}
.btn-ghost{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.4);color:#fff;}
.btn-gmid{background:var(--gmid);color:#fff;}
.btn-red{background:#b83232;color:#fff;font-size:11px;padding:5px 8px;}
.btn-active{background:#fff;color:var(--brand-dark);box-shadow:inset 0 0 0 2px var(--brand-dark);}
.sync-wrap{display:flex;align-items:center;gap:5px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.8);}
.sync-dot.on{background:#92D050;animation:pulse 2s infinite;}
.sync-dot.off{background:#ff7070;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-lbl{font-size:11px;color:rgba(255,255,255,.65);}
.cfg-strip{background:#fff;border-bottom:1px solid var(--gb);padding:9px 18px;display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap;}
.cfg-lbl{font-size:10px;font-weight:700;color:var(--grey3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px;display:block;}
.cfg-inp{border:1.5px solid var(--gb);border-radius:3px;padding:5px 8px;font-family:var(--font);font-size:13px;color:var(--grey1);background:#fafafa;}
.cfg-inp:focus{outline:2px solid var(--brand);border-color:transparent;}
.day-grp{display:flex;gap:5px;}
.day-btn{padding:5px 12px;border-radius:3px;border:1.5px solid var(--gb);background:#fafafa;font-family:var(--font);
font-size:12px;font-weight:700;cursor:pointer;color:var(--grey3);transition:all .15s;}
.day-btn.on{background:var(--gdark);color:#fff;border-color:var(--gdark);}
.cap-strip{background:var(--brand);border-bottom:2px solid var(--brand-dark);padding:6px 18px;display:flex;align-items:center;overflow-x:auto;}
.cap-strip-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.7px;text-transform:uppercase;white-space:nowrap;margin-right:10px;flex-shrink:0;}
.cap-chips{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;}
.cap-chip{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:3px;padding:3px 9px;
font-size:11px;color:#fff;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;}
.cap-chip .cn{opacity:.65;font-size:10px;}.cap-chip .cu{font-weight:700;}.cap-chip .co{opacity:.55;font-size:10px;}
.cap-chip.over{background:rgba(180,40,40,.35);border-color:#ff9090;}.cap-chip.over .cu{color:#ffc0c0;}
.cap-chip.warn{background:rgba(200,160,0,.3);border-color:#ffd166;}.cap-chip.warn .cu{color:#fff3a0;}
.leg-strip{background:#f4f4f4;border-bottom:1px solid var(--gb);padding:6px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.leg-lbl{font-size:10px;font-weight:700;color:var(--grey3);text-transform:uppercase;letter-spacing:.6px;}
.pip{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 10px;border-radius:3px;border:1px solid rgba(0,0,0,.12);}
.pip-ns{background:var(--ns);color:var(--ns-t);border-color:#ccc;}.pip-ip{background:var(--ip);color:var(--ip-t);}
.pip-done{background:var(--done);color:var(--done-t);}.pip-hold{background:var(--hold);color:var(--hold-t);}
.leg-note{font-size:11px;color:var(--grey3);margin-left:6px;}
.main{padding:14px 14px 80px;}
.week-section{margin-bottom:22px;}
.week-section-hdr{background:var(--gdark);color:#fff;padding:8px 14px;border-radius:5px 5px 0 0;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;}
.week-section-hdr .wk-label{font-size:14px;letter-spacing:.6px;}
.week-section-hdr .wk-meta{opacity:.65;font-size:11px;}
.week-section-hdr .wk-cap{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:3px;padding:3px 10px;font-size:11px;}
.wk-cap-bar{background:var(--brand);padding:5px 14px;display:flex;align-items:center;overflow-x:auto;border-bottom:1px solid var(--brand-dark);}
.wk-cap-bar .cap-strip-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:.6px;text-transform:uppercase;white-space:nowrap;margin-right:8px;flex-shrink:0;}
.wk-cap-bar .cap-chips{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;}
.wk-cap-bar .cap-chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);border-radius:3px;padding:2px 7px;font-size:10px;color:#fff;display:flex;align-items:center;gap:3px;white-space:nowrap;flex-shrink:0;}
.wk-cap-bar .cap-chip .cn{opacity:.6;font-size:9px;}.wk-cap-bar .cap-chip .cu{font-weight:700;}.wk-cap-bar .cap-chip .co{opacity:.5;font-size:9px;}
.wk-cap-bar .cap-chip.over{background:rgba(180,40,40,.35);border-color:#ff9090;}.wk-cap-bar .cap-chip.over .cu{color:#ffc0c0;}
.wk-cap-bar .cap-chip.warn{background:rgba(200,160,0,.3);border-color:#ffd166;}.wk-cap-bar .cap-chip.warn .cu{color:#fff3a0;}
.tbl-wrap{background:#fff;border:1px solid var(--gb);border-top:none;border-radius:0 0 5px 5px;overflow-x:auto;box-shadow:0 2px 6px rgba(0,0,0,.08);}
table{border-collapse:collapse;width:100%;table-layout:auto;}
thead tr.th-d th{background:var(--gdark);color:#fff;text-align:center;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:7px 4px;border-right:1px solid rgba(255,255,255,.1);white-space:nowrap;}
thead tr.th-d th.th-info{background:#2a2a2a;}thead tr.th-d th.th-ttl{background:#111;}thead tr.th-d th.th-act{background:#111;width:36px;}
thead tr.th-c th{background:var(--brand-lite);color:var(--brand-dark);text-align:center;font-size:10px;font-weight:700;padding:4px 3px;border-right:1px solid #c5ddc9;border-bottom:2px solid #aacfb0;}
thead tr.th-c th.cv{color:var(--gmid);font-size:11px;}
tbody tr{border-bottom:1px solid #ebebeb;}
td{padding:0;border-right:1px solid #e5e5e5;vertical-align:middle;}td:last-child{border-right:none;}
td.info-cell{background:#fff;}
.c-lt{width:52px;min-width:52px;}.c-pr{width:100px;min-width:90px;}.c-prio{width:42px;min-width:42px;}
.c-job{width:84px;min-width:76px;}.c-wo{width:120px;min-width:110px;}.c-os{width:100px;min-width:90px;}
.c-dp{min-width:118px;}.c-ttl{width:52px;min-width:52px;}.c-act{width:36px;min-width:36px;}
.ci{width:100%;border:none;background:transparent;padding:8px 5px;font-family:var(--font);font-size:12px;color:var(--grey1);text-align:center;pointer-events:none;cursor:default;user-select:none;}
.ci-job{text-align:left;padding-left:9px;font-weight:700;font-size:13px;}
.ci-wo{font-size:12px;font-weight:600;color:var(--grey2);}.ci-pri{font-weight:700;color:var(--gdark);}
.col-hidden{display:none;}
td.dc{padding:0;}
.dr{display:flex;align-items:stretch;min-height:36px;height:100%;}
.dh{flex:0 0 46px;width:46px;border:none;background:transparent;padding:0 4px;font-family:var(--font);font-size:12px;font-weight:700;text-align:center;color:inherit;border-right:1px solid rgba(0,0,0,.12);pointer-events:none;cursor:default;user-select:none;}
.ds{flex:1;min-width:70px;border:none;background:transparent;padding:0 2px;font-family:var(--font);font-size:9px;font-weight:700;text-align:center;text-align-last:center;cursor:pointer;appearance:none;-webkit-appearance:none;color:inherit;}
.ds:focus{outline:2px solid rgba(0,0,0,.2);}
.v-ns{background:var(--ns);color:var(--ns-t);}.v-ip{background:var(--ip);color:var(--ip-t);}
.v-done{background:var(--done);color:var(--done-t);}
.v-ns,.v-ip,.v-hold,.v-done{border:2px solid rgba(0,0,0,.18);box-shadow:inset 0 0 0 1px rgba(255,255,255,.25);}.v-hold{background:var(--hold);color:var(--hold-t);}
/* material status colors */
.ms-cell{text-align:center;font-size:10px;font-weight:700;padding:6px 4px;white-space:nowrap;}
.ms-fmto{background:#64B5F6;color:#FFFFFF;border:2px solid #1565C0;}
.ms-wait{background:#EF5350;color:#FFFFFF;border:2px solid #C62828;}
.ms-del {background:#66BB6A;color:#FFFFFF;border:2px solid #2E7D32;}
.ms-none{background:#fff;color:#aaa;}
/* priority colors -- google material design */
td.pri-1{background:#E53935 !important;color:#FFFFFF;font-weight:700;border:2px solid #B71C1C;}
td.pri-2{background:#FF9800 !important;color:#FFFFFF;font-weight:700;border:2px solid #E65100;}
td.pri-3{background:#CFD8DC !important;color:#37474F;font-weight:700;border:2px solid #78909C;}
td.pri-1 .ci,td.pri-2 .ci,td.pri-3 .ci{color:inherit;font-weight:700;}
.c-ms{min-width:100px;width:100px;}
.c-ea{min-width:90px;width:90px;}
.c-sd{min-width:90px;width:90px;}
.ttl{padding:8px 5px;text-align:center;font-weight:700;font-size:13px;background:#f2f2f2;color:var(--grey1);}
.act{padding:4px 4px;text-align:center;background:#f8f8f8;}
tr.tot td{background:#1a1a1a!important;color:#fff!important;font-weight:700;font-size:12px;padding:7px 5px;text-align:center;border-right:1px solid #333;}
tr.tot td.tot-lbl{text-align:right;padding-right:10px;font-size:10px;color:#888!important;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:flex-start;justify-content:center;padding:36px 16px;overflow-y:auto;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:8px;width:100%;max-width:760px;box-shadow:0 10px 50px rgba(0,0,0,.4);overflow:hidden;}
.modal-hdr{background:var(--gdark);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.modal-hdr h2{font-size:15px;font-weight:700;}
.modal-x{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;opacity:.7;line-height:1;padding:0 4px;}.modal-x:hover{opacity:1;}
.modal-body{padding:20px;}
.tabs{display:flex;border-bottom:2px solid var(--gb);margin-bottom:18px;}
.tab{padding:8px 18px;font-family:var(--font);font-size:12px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--grey3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s;}
.tab.on{color:var(--gdark);border-bottom-color:var(--gdark);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fr{display:flex;flex-direction:column;gap:4px;}
.fr label{font-size:11px;font-weight:700;color:var(--grey3);text-transform:uppercase;letter-spacing:.5px;}
.fr input,.fr select{border:1.5px solid var(--gb);border-radius:3px;padding:7px 10px;font-family:var(--font);font-size:13px;color:var(--grey1);background:#fafafa;width:100%;}
.fr input:focus,.fr select:focus{outline:2px solid var(--brand);border-color:transparent;}
.fsec{font-size:11px;font-weight:700;color:var(--gdark);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--brand-lite);}
.dhg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.factions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}
.wk-assign{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;max-height:140px;overflow-y:auto;padding:4px;}
.wk-check{display:flex;align-items:center;gap:4px;background:#f4f4f4;border:1.5px solid var(--gb);border-radius:3px;padding:4px 8px;cursor:pointer;transition:all .15s;font-size:11px;font-weight:700;}
.wk-check input{width:13px;height:13px;cursor:pointer;accent-color:var(--gdark);}
.wk-check:hover{border-color:var(--brand);background:var(--brand-lite);}
.dtbl{width:100%;border-collapse:collapse;}
.dtbl th{background:var(--brand-lite);color:var(--brand-dark);padding:7px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #c5ddc9;}
.dtbl td{padding:7px 8px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
.dtbl input[type=number]{width:62px;border:1.5px solid var(--gb);border-radius:3px;padding:5px 6px;font-family:var(--font);font-size:13px;text-align:center;}
.dtbl input:focus{outline:2px solid var(--brand);border-color:transparent;}
.sbtns{display:flex;gap:4px;}
.sbtn{padding:4px 9px;border-radius:3px;border:1.5px solid var(--gb);background:#fafafa;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;color:var(--grey3);transition:all .15s;}
.sbtn.on{background:var(--gdark);color:#fff;border-color:var(--gdark);}
.capdisplay{font-weight:700;color:var(--gmid);font-size:13px;}
.jlist{display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto;}
.jitem{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#fafafa;border:1px solid var(--gb);border-radius:4px;gap:10px;}
.jname{font-weight:700;font-size:13px;}.jsub{font-size:11px;color:var(--grey3);margin-top:2px;}
.jwks{font-size:10px;font-weight:700;color:var(--brand-dark);margin-top:3px;}
.pwscreen{display:flex;flex-direction:column;align-items:center;gap:14px;padding:32px 20px;text-align:center;}
.pwscreen h3{font-size:17px;color:var(--gdark);}.pwscreen p{font-size:12px;color:var(--grey3);}
.pwinp{border:2px solid var(--gb);border-radius:4px;padding:10px 14px;font-family:var(--font);font-size:15px;width:220px;text-align:center;letter-spacing:2px;}
.pwinp:focus{outline:2px solid var(--brand);border-color:transparent;}
.pwerr{color:#b83232;font-size:12px;font-weight:700;min-height:18px;}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--gdark);color:#fff;padding:10px 22px;border-radius:4px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .25s;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3);}
#toast.show{opacity:1;}
.loading-overlay{position:fixed;inset:0;background:rgba(26,61,43,.95);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:16px;}
.loading-overlay .spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){header{height:auto;padding:10px 12px;flex-wrap:wrap;gap:8px;}.main{padding:10px 8px 80px;}.fg{grid-template-columns:1fr;}.dhg{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="loading-overlay" id="loading"><div class="spinner"></div><div style="font-size:14px;font-weight:700;">Loading SHM Scheduler…</div></div>

<div class="day-grp"><button class="wv-btn day-btn" onclick="setWeekView(1)">1</button><button class="wv-btn day-btn on" onclick="setWeekView(2)">2</button><button class="wv-btn day-btn" onclick="setWeekView(3)">3</button><button class="wv-btn day-btn" onclick="setWeekView(4)">4</button><button class="wv-btn day-btn" onclick="setWeekView(6)">6</button></div>
</div>
</div>
<div class="cap-strip"><span class="cap-strip-lbl" id="cap-strip-title">Total Capacity</span><div class="cap-chips" id="cap-chips"></div></div>
<div class="leg-strip">
<span class="leg-lbl">Cell Status</span>
<span class="pip pip-ns">NOT STARTED</span><span class="pip pip-ip">IN PROCESS</span><span class="pip pip-done">DONE</span><span class="pip pip-hold">HOLD</span>
<span class="leg-note">Each department cell is updated independently.</span>
</div>
<div class="main" id="main-content"></div>
<div id="toast"></div>
<div class="overlay" id="adm-overlay"><div class="modal"><div class="modal-hdr"><h2 id="adm-title">Admin</h2><button class="modal-x" onclick="closeAdmin()">✕</button></div><div class="modal-body" id="adm-body"></div></div></div>
<script>
// ══════════════════════════════════════════════════
// FIREBASE INIT
// ══════════════════════════════════════════════════
firebase.initializeApp({
  apiKey:"AIzaSyBdRTsZvNE-Ioolk6xrXduyqs95dxZ0w_s",
  authDomain:"shm-shop-schedule.firebaseapp.com",
  databaseURL:"https://shm-shop-schedule-default-rtdb.firebaseio.com",
  projectId:"shm-shop-schedule",
  storageBucket:"shm-shop-schedule.firebasestorage.app",
  messagingSenderId:"891016337157",
  appId:"1:891016337157:web:4caf662a379afdabeec96c"
});
const db=firebase.database();

// ══════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════
const PW='shm2026';
const DEPTS=[{key:'she',label:'Shear'},{key:'wat',label:'Waterjet'},{key:'vgr',label:'V-Groove'},{key:'brk',label:'Brake'},{key:'fab',label:'Fabrication'},{key:'pol',label:'Polishing'},{key:'fin',label:'Finishing'},{key:'core',label:'Core/Clad'},{key:'han',label:'Handling'},{key:'cra',label:'Crating'}];
const DOLLAR_DEPTS=[{key:'out',label:'Outsource ($)'},{key:'pow',label:'Powder Coat ($)'}];
const ST=['NOT STARTED','IN PROCESS','DONE','HOLD'];
const SC={'NOT STARTED':'v-ns','IN PROCESS':'v-ip','DONE':'v-done','HOLD':'v-hold'};

function defDS(){const s={};DEPTS.forEach(d=>{s[d.key]={headcount:1,shift:8};});s.fab.headcount=8;s.pol.headcount=7;s.fin.headcount=3;s.core.headcount=2;return s;}

// Current week number for reference
function currentISOWeek(){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+3-(d.getDay()+6)%7);const w1=new Date(d.getFullYear(),0,4);return 1+Math.round(((d-w1)/864e5-3+(w1.getDay()+6)%7)/7);}

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let rows={},config={week:currentISOWeek(),weekStart:'',days:5},deptSettings=defDS(),weekConfigs={};
let adminOn=false,showAll=false,weekView=2,loaded=false,backlogOpen=false;

// ══════════════════════════════════════════════════
// FIREBASE LISTENERS (real-time sync)
// ══════════════════════════════════════════════════
db.ref('config').on('value',snap=>{
  if(snap.val()){config={...config,...snap.val()};applyCfg();}
  checkLoaded();
});
db.ref('rows').on('value',snap=>{
  rows=snap.val()||{};
  if(loaded)renderMain();
  checkLoaded();
});
db.ref('deptSettings').on('value',snap=>{
  if(snap.val())deptSettings={...defDS(),...snap.val()};
  if(loaded){renderCapStrip();renderMain();}
  checkLoaded();
});
db.ref('weekConfigs').on('value',snap=>{
  weekConfigs=snap.val()||{};
  if(loaded){renderCapStrip();renderMain();}
  checkLoaded();
});

let loadCount=0;
function checkLoaded(){loadCount++;if(loadCount>=4&&!loaded){loaded=true;applyCfg();renderAll();document.getElementById('loading').style.display='none';}}

// ══════════════════════════════════════════════════
// FIREBASE WRITES
// ══════════════════════════════════════════════════
function saveConfig(){db.ref('config').set(config);}
function saveRow(id){db.ref('rows/'+id).set(rows[id]);}
function deleteRowFB(id){db.ref('rows/'+id).remove();}
function saveDeptSettingsFB(){db.ref('deptSettings').set(deptSettings);}

// ══════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════
function applyCfg(){
  document.getElementById('cfg-week').value=config.week||25;
  document.getElementById('cfg-wstart').value=config.weekStart||'';
  setDayBtns(config.days||5);
  updateSub();
  if(loaded){renderCapStrip();renderMain();}
}
function saveCfg(){
  config.week=parseInt(document.getElementById('cfg-week').value)||1;
  config.weekStart=document.getElementById('cfg-wstart').value;
  updateSub();saveConfig();renderCapStrip();renderMain();
}
function setDays(n){
  config.days=n;setDayBtns(n);saveConfig();
  // also update weekConfigs for current week
  const curWk=config.week||25;
  const wc=getWeekConfig(curWk);wc.days=n;weekConfigs[curWk]=wc;
  db.ref('weekConfigs/'+curWk).set(wc);
  renderCapStrip();renderMain();
}
function setDayBtns(n){document.querySelectorAll('.day-btn').forEach(b=>{b.classList.toggle('on',parseInt(b.textContent)===n);});}
function updateSub(){
  const w=config.week||'—';
  const ws=config.weekStart?new Date(config.weekStart+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';
  document.getElementById('hdr-sub').textContent=showAll?'Viewing All Weeks':`Week ${w}  ·  ${ws}`;
}
function deptCap(key,days){const ds=deptSettings[key];return ds?(ds.headcount*ds.shift*(days||config.days||5)):0;}

function setWeekView(n){
  weekView=n;
  document.querySelectorAll('.wv-btn').forEach(b=>{b.classList.toggle('on',parseInt(b.textContent)===n);});
  renderMain();renderCapStrip();
}

function getWeekConfig(wkNum){
  return weekConfigs[wkNum]||{days:config.days||5,shift:8};
}

function deptCapForWeek(key,wkNum){
  const ds=deptSettings[key];if(!ds)return 0;
  const wc=getWeekConfig(wkNum);
  return ds.headcount*(wc.shift||ds.shift||8)*(wc.days||config.days||5);
}

function toggleAllWeeks(){
  showAll=!showAll;
  const btn=document.getElementById('btn-allweeks');
  btn.textContent=showAll?'📅 Current Week':'📅 All Weeks';
  btn.className=showAll?'btn btn-active':'btn btn-ghost';
  updateSub();renderMain();
}

// ══════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════
function renderAll(){renderMain();renderCapStrip();}

function getRowsArray(){return Object.entries(rows).map(([id,r])=>({...r,_id:id}));}

function getWeeksWithJobs(){
  const wkSet=new Set();
  getRowsArray().forEach(r=>{const wks=r.weeks||{};Object.keys(wks).forEach(k=>{if(wks[k])wkSet.add(parseInt(k));});});
  return Array.from(wkSet).sort((a,b)=>a-b);
}

function renderMain(){
  const container=document.getElementById('main-content');
  container.innerHTML='';
  const curWk=config.week||25;

  let visWeeks;
  if(showAll&&adminOn){
    visWeeks=getWeeksWithJobs();
    if(visWeeks.length===0)visWeeks=[curWk];
  } else {
    visWeeks=[];
    for(let i=0;i<weekView;i++)visWeeks.push(curWk+i);
  }

  visWeeks.forEach(wkNum=>{
    const allRows=getRowsArray();
    const wkRows=allRows.filter(r=>r.weeks&&r.weeks[wkNum]);
    if(!showAll&&wkRows.length===0)return; // don't show empty weeks

    const section=document.createElement('div');section.className='week-section';
    const hdr=document.createElement('div');hdr.className='week-section-hdr';
    const totalHrs=wkRows.reduce((s,r)=>s+deptTtl(r,wkNum),0);
    hdr.innerHTML=`<div><span class="wk-label">WEEK ${wkNum}</span></div>
      <div style="display:flex;align-items:center;gap:10px">
      <span class="wk-meta">${wkRows.length} job${wkRows.length!==1?'s':''}</span>
      <span class="wk-cap">${fmt(totalHrs)} total hrs</span></div>`;
    section.appendChild(hdr);

    // per-week capacity bar
    const wkCapBar=document.createElement('div');wkCapBar.className='wk-cap-bar';
    wkCapBar.innerHTML='<span class="cap-strip-lbl">Wk '+wkNum+' Capacity</span>';
    const wkChips=document.createElement('div');wkChips.className='cap-chips';
    DEPTS.forEach(d=>{
      const cap=deptCap(d.key);
      const used=wkRows.reduce((s,r)=>s+(r['h_'+d.key+'_'+wkNum]||0),0);
      const pct=cap>0?used/cap:0;
      const chip=document.createElement('div');
      chip.className='cap-chip'+(pct>1?' over':pct>.85?' warn':'');
      chip.innerHTML='<span class="cn">'+d.label+'</span><span class="cu">'+fmt(used)+'</span><span class="co">/'+deptCap(d.key)+'</span>';
      wkChips.appendChild(chip);
    });
    wkCapBar.appendChild(wkChips);
    section.appendChild(wkCapBar);

    const wrap=document.createElement('div');wrap.className='tbl-wrap';
    const tbl=document.createElement('table');
    tbl.appendChild(buildThead(wkNum));
    const tbody=document.createElement('tbody');
    wkRows.forEach(r=>tbody.appendChild(buildRow(r,wkNum)));
    tbl.appendChild(tbody);
    const tfoot=document.createElement('tfoot');
    tfoot.appendChild(buildTotalsRow(wkRows,wkNum));
    tbl.appendChild(tfoot);
   wrap.appendChild(tbl);section.appendChild(wrap);
    container.appendChild(section);
  });
  renderBacklogBucket(container);
  updateSub();
  if(adminOn)document.getElementById('btn-allweeks').style.display='';
}

function renderBacklogBucket(container){
  const bl=getRowsArray().filter(r=>r.backlog);
  if(bl.length===0)return;
  const section=document.createElement('div');section.className='week-section';
  const hdr=document.createElement('div');hdr.className='week-section-hdr';
  hdr.style.cursor='pointer';hdr.style.background='#5D4037';
  const totalHrs=bl.reduce((s,r)=>s+DEPTS.reduce((a,d)=>a+((r.bh&&r.bh[d.key])||0),0),0);
  hdr.innerHTML='<div><span class="wk-label">📋 BACKLOG '+(backlogOpen?'▾':'▸')+'</span></div>'
    +'<div style="display:flex;align-items:center;gap:10px">'
    +'<span class="wk-meta">'+bl.length+' job'+(bl.length!==1?'s':'')+'</span>'
    +'<span class="wk-cap">'+fmt(totalHrs)+' planned hrs</span></div>';
  hdr.onclick=()=>{backlogOpen=!backlogOpen;renderMain();};
  section.appendChild(hdr);
  if(backlogOpen){
    const wrap=document.createElement('div');wrap.className='tbl-wrap';wrap.style.padding='10px';
    const list=document.createElement('div');list.className='jlist';
    bl.forEach(r=>{
      const hrs=DEPTS.reduce((a,d)=>a+((r.bh&&r.bh[d.key])||0),0);
      const assigned=r.weeks?Object.keys(r.weeks).filter(k=>r.weeks[k]):[];
      const item=document.createElement('div');item.className='jitem';
      item.innerHTML='<div><div class="jname">Job #'+(r.job||'—')+'</div>'
        +'<div class="jsub">WO# '+(r.wo||'—')+' · On Site: '+(r.os||'—')+' · Priority: '+(r.prio||'—')+' · '+fmt(hrs)+' hrs</div>'
        +'<div class="jwks">'+(assigned.length?('Also in weeks: '+assigned.join(', ')):'Not yet released — set a week in Edit to release it')+'</div></div>';
      if(adminOn){
        const btn=document.createElement('button');btn.className='btn btn-gmid';btn.textContent='Edit / Release';
        btn.onclick=()=>{openAdmin();editJob(r._id);};
        item.appendChild(btn);
      }
      list.appendChild(item);
    });
    wrap.appendChild(list);section.appendChild(wrap);
  }
  container.appendChild(section);
}

function buildThead(wkNum){
  const thead=document.createElement('thead');
  const tr1=document.createElement('tr');tr1.className='th-d';
  const mTh=(t,c)=>{const th=document.createElement('th');th.textContent=t;th.className=c||'';return th;};
  tr1.appendChild(mTh('LEAD TIME','th-info c-lt'));
  tr1.appendChild(mTh('PROD. RELEASE','th-info c-pr'));
  tr1.appendChild(mTh('PRI.','th-info c-prio'));
  tr1.appendChild(mTh('JOB #','th-info c-job'));
  tr1.appendChild(mTh('WO #','th-info c-wo'));
  tr1.appendChild(mTh('MTL STATUS','th-info c-ms'));
  tr1.appendChild(mTh('EXP. ARRIVAL','th-info c-ea'));
  tr1.appendChild(mTh('SHIP DATE','th-info c-sd'));
  tr1.appendChild(mTh('ON SITE','th-info c-os'+(adminOn?'':' col-hidden')));
  DEPTS.forEach(d=>tr1.appendChild(mTh(d.label.toUpperCase(),'c-dp')));
  tr1.appendChild(mTh('TTL','th-ttl c-ttl'));
  if(adminOn)tr1.appendChild(mTh('','th-act c-act'));
  thead.appendChild(tr1);

  const tr2=document.createElement('tr');tr2.className='th-c';
  const infoCols=adminOn?9:8;
  const thL=document.createElement('th');thL.colSpan=infoCols;thL.textContent='DEPT CAPACITY (HRS)';
  thL.style.cssText='text-align:right;padding-right:10px;font-size:10px;color:#888';
  tr2.appendChild(thL);
  DEPTS.forEach(d=>{const th=document.createElement('th');th.className='cv';th.textContent=deptCap(d.key);tr2.appendChild(th);});
  const thG=document.createElement('th');thG.className='cv';thG.textContent=DEPTS.reduce((s,d)=>s+deptCap(d.key),0);tr2.appendChild(thG);
  if(adminOn)tr2.appendChild(document.createElement('th'));
  thead.appendChild(tr2);
  return thead;
}

function buildRow(row,wkNum){
  const tr=document.createElement('tr');tr.dataset.id=row._id;tr.dataset.wk=wkNum;

  function iCell(field,cls,restricted){
    const td=document.createElement('td');
    td.className='info-cell'+(restricted&&!adminOn?' col-hidden':'');
    const span=document.createElement('input');span.type='text';span.readOnly=true;
    span.className='ci'+(cls?' '+cls:'');
    span.value=row[field]??'';span.tabIndex=-1;
    td.appendChild(span);return td;
  }

  tr.appendChild(iCell('lt','',false));
  tr.appendChild(iCell('pr','',false));
  // Priority cell -- color coded
  (function(){
    const td=document.createElement('td');td.className='info-cell';
    const inp=document.createElement('input');inp.type='text';inp.readOnly=true;
    inp.className='ci ci-pri';inp.value=row.prio||'';inp.tabIndex=-1;
    const p=String(row.prio||'').trim();
    if(p==='1'){td.className='info-cell pri-1';}
    else if(p==='2'){td.className='info-cell pri-2';}
    else if(p==='3'){td.className='info-cell pri-3';}
    td.appendChild(inp);tr.appendChild(td);
  })();
  tr.appendChild(iCell('job','ci-job',false));
  tr.appendChild(iCell('wo','ci-wo',false));

  // Material Status cell -- color coded
  (function(){
    const td=document.createElement('td');td.className='info-cell';
    const ms=row.mtlStatus||'';
    const msCls={'FINAL MTO':'ms-fmto','WAITING ON MATERIAL':'ms-wait','SHOP':'ms-del'};
    const span=document.createElement('div');
    span.className='ms-cell '+(msCls[ms]||'ms-none');
    span.textContent=ms||'—';
    td.appendChild(span);tr.appendChild(td);
  })();

  // Expected Arrival cell
  (function(){
    const td=document.createElement('td');td.className='info-cell';
    const inp=document.createElement('input');inp.type='text';inp.readOnly=true;
    inp.className='ci';inp.value=row.expArrival||'';inp.tabIndex=-1;
    td.appendChild(inp);tr.appendChild(td);
  })();

  // Ship Date cell -- On Site minus 2 days, auto-calculated
  (function(){
    const td=document.createElement('td');td.className='info-cell';
    const inp=document.createElement('input');inp.type='text';inp.readOnly=true;
    inp.className='ci';inp.tabIndex=-1;
    if(row.os){
      const osDate=new Date(row.os+'T00:00:00');
      osDate.setDate(osDate.getDate()-2);
      inp.value=osDate.toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'});
    } else { inp.value=''; }
    td.appendChild(inp);tr.appendChild(td);
  })();

  tr.appendChild(iCell('os','',true));

  DEPTS.forEach(d=>{
    const sKey='s_'+d.key+'_'+wkNum;
    const hKey='h_'+d.key+'_'+wkNum;
    const st=row[sKey]||'NOT STARTED';
    const hrs=row[hKey]||0;
    const td=document.createElement('td');
    td.className='dc c-dp '+(SC[st]||'v-ns');

    const div=document.createElement('div');div.className='dr';
    const hi=document.createElement('input');hi.type='text';hi.className='dh';hi.readOnly=true;
    hi.value=fmt(hrs);hi.tabIndex=-1;

    const sel=document.createElement('select');sel.className='ds';
    ST.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;if(s===st)o.selected=true;sel.appendChild(o);});
 sel.addEventListener('change',e=>{
      const newSt=e.target.value;
      const updates={};
      updates[sKey]=newSt;
      if(newSt==='DONE'){
        const jw=Object.keys(rows[row._id].weeks||{}).filter(k=>rows[row._id].weeks[k]);
        jw.forEach(w=>{updates['h_'+d.key+'_'+w]=0;updates['s_'+d.key+'_'+w]='DONE';});
        hi.value='0';
      }
      // write to firebase
      Object.entries(updates).forEach(([k,v])=>{rows[row._id][k]=v;});
      db.ref('rows/'+row._id).update(updates);
      td.className='dc c-dp '+(SC[newSt]||'v-ns');
      // update totals inline
      updateTotalsInline(wkNum);
    });

    div.appendChild(hi);div.appendChild(sel);td.appendChild(div);tr.appendChild(td);
  });

  const ttl=deptTtl(row,wkNum);
  const tdT=document.createElement('td');tdT.className='ttl c-ttl';tdT.textContent=fmt(ttl);tr.appendChild(tdT);

  if(adminOn){
    const tdA=document.createElement('td');tdA.className='act c-act';
    const db2=document.createElement('button');db2.className='btn btn-red';db2.textContent='✕';
    db2.onclick=()=>{
      if(!confirm('Remove this job from week '+wkNum+'?'))return;
      const r=rows[row._id];if(!r)return;
      if(r.weeks)delete r.weeks[wkNum];
      // clean up week-specific data
      DEPTS.forEach(d=>{delete r['s_'+d.key+'_'+wkNum];delete r['h_'+d.key+'_'+wkNum];});
      const hasWeeks=r.weeks&&Object.values(r.weeks).some(v=>v);
      if(!hasWeeks){deleteRowFB(row._id);delete rows[row._id];}
      else{saveRow(row._id);}
      renderAll();
    };
    tdA.appendChild(db2);tr.appendChild(tdA);
  }
  return tr;
}

function updateTotalsInline(wkNum){
  // recalc totals for this week's table
  const allRows=getRowsArray().filter(r=>r.weeks&&r.weeks[wkNum]);
  document.querySelectorAll(`tr[data-wk="${wkNum}"]`).forEach(tr=>{
    const id=tr.dataset.id;const r=rows[id];if(!r)return;
    const tc=tr.querySelector('.ttl');
    if(tc)tc.textContent=fmt(deptTtl({...r,_id:id},wkNum));
  });
  // update totals row (re-render is simplest)
  renderCapStrip();
}

function buildTotalsRow(wkRows,wkNum){
  const tr=document.createElement('tr');tr.className='tot';
  const cs=adminOn?9:8;
  const tl=document.createElement('td');tl.colSpan=cs;tl.className='tot-lbl';tl.textContent='TOTALS →';tr.appendChild(tl);
  DEPTS.forEach(d=>{
    const t=wkRows.reduce((s,r)=>s+(r['h_'+d.key+'_'+wkNum]||0),0);
    const td=document.createElement('td');td.textContent=fmt(t);tr.appendChild(td);
  });
  const g=wkRows.reduce((s,r)=>s+deptTtl(r,wkNum),0);
  const tg=document.createElement('td');tg.textContent=fmt(g);tr.appendChild(tg);
  if(adminOn)tr.appendChild(document.createElement('td'));
  return tr;
}

function deptTtl(row,wkNum){return DEPTS.reduce((s,d)=>s+(row['h_'+d.key+'_'+wkNum]||0),0);}

function renderCapStrip(){
  const curWk=config.week||25;
  let visWeeks;
  if(showAll&&adminOn){visWeeks=getWeeksWithJobs();}
  else{visWeeks=[];for(let i=0;i<weekView;i++)visWeeks.push(curWk+i);}
  const activeWeeks=visWeeks.filter(wk=>{
    if(showAll&&adminOn)return true;
    return getRowsArray().some(r=>r.weeks&&r.weeks[wk]);
  });
  if(activeWeeks.length===0)activeWeeks.push(curWk);
  const numWeeks=activeWeeks.length;

  // update label
  const title=document.getElementById('cap-strip-title');
  if(title)title.textContent=numWeeks>1?`Combined Capacity (${numWeeks} weeks)`:'Week Capacity';

  const allRows=getRowsArray();
  const c=document.getElementById('cap-chips');c.innerHTML='';
  DEPTS.forEach(d=>{
    const cap=deptCap(d.key)*numWeeks;
    const used=activeWeeks.reduce((ws,wk)=>ws+allRows.filter(r=>r.weeks&&r.weeks[wk]).reduce((s,r)=>s+(r['h_'+d.key+'_'+wk]||0),0),0);
    const pct=cap>0?used/cap:0;
    const chip=document.createElement('div');
    chip.className='cap-chip'+(pct>1?' over':pct>.85?' warn':'');
    chip.innerHTML='<span class="cn">'+d.label+'</span><span class="cu">'+fmt(used)+'</span><span class="co">/'+cap+'</span>';
    c.appendChild(chip);
  });
}

// ══════════════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════════════
function exportExcel(){
  const wb=XLSX.utils.book_new();
  const curWk=config.week||25;
  const visWeeks=showAll&&adminOn?getWeeksWithJobs():(function(){const w=[];for(let i=0;i<weekView;i++)w.push(curWk+i);return w;})();
  const hdr=['WEEK','LEAD TIME','PROD. RELEASE','PRIORITY','JOB #','WO #','MTL STATUS','EXP. ARRIVAL','SHIP DATE','ON SITE',...DEPTS.map(d=>d.label),'TTL',...DOLLAR_DEPTS.map(d=>d.label)];
  const data=[hdr];
  visWeeks.forEach(wk=>{
    const wkRows=getRowsArray().filter(r=>r.weeks&&r.weeks[wk]);
    if(wkRows.length===0)return;
    wkRows.forEach(r=>{
      const shipDate=r.os?(function(){const d=new Date(r.os+'T00:00:00');d.setDate(d.getDate()-2);return d.toISOString().slice(0,10);})(  ):'';
      data.push([wk,r.lt,r.pr,r.prio,r.job,r.wo,r.mtlStatus||'',r.expArrival||'',shipDate,r.os,...DEPTS.map(d=>r['h_'+d.key+'_'+wk]||0),deptTtl(r,wk),...DOLLAR_DEPTS.map(d=>r[d.key]||0)]);
    });
    data.push(['','','','','TOTALS','','','','','',...DEPTS.map(d=>wkRows.reduce((s,r)=>s+(r['h_'+d.key+'_'+wk]||0),0)),wkRows.reduce((s,r)=>s+deptTtl(r,wk),0),'','']);
    data.push([]);
  });
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:6},{wch:10},{wch:12},{wch:6},{wch:20},{wch:10},{wch:18},{wch:12},{wch:12},{wch:12},...DEPTS.map(()=>({wch:11})),{wch:8},...DOLLAR_DEPTS.map(()=>({wch:14}))];
  XLSX.utils.book_append_sheet(wb,ws,'Schedule');
  const dn=new Date().toISOString().slice(0,10).replace(/-/g,'');
  XLSX.writeFile(wb,`SHM_Scheduler_${dn}.xlsx`);
  showToast('Excel exported');
}

function chkPw(){

function renderPanels(tab){

  <div class="fg">

    <div class="fr"><label>WO #</label><input type="text" id="nj-wo" placeholder="e.g. 46215"></div>

    </div>
    <div class="fr"><label>Expected Arrival</label><input type="date" id="nj-ea"></div>
  </div>
 <div class="fsec">Backlog</div>
  <label class="wk-check" style="width:auto"><input type="checkbox" id="nj-backlog" onchange="if(this.checked)document.querySelectorAll('input[name=nj-wk]').forEach(c=>c.checked=false)"><span>Hold in Backlog — clears week selection (one or the other)</span></label>
  <div class="fsec">Assign to Week(s)</div>
  <p style="font-size:11px;color:var(--grey3);margin-bottom:6px">Hours and status are tracked per week. A Backlog job can have no weeks checked; check weeks when you release it.</p>
  <div class="wk-assign">${wkChecks}</div>
  <div class="fsec">Department Hours (applied to all selected weeks)</div>

  <div class="factions"><button class="btn" style="background:#eee;color:#555" onclick="renderPanels('add')">Clear</button>
  <button class="btn btn-gmid" onclick="submitAdd()">Add Job to Schedule</button></div>`;

function calcLT(){
  const pr=document.getElementById('nj-pr'),os=document.getElementById('nj-os'),lt=document.getElementById('nj-lt');
  if(!pr||!os||!lt)return;
  if(pr.value&&os.value){const diff=Math.round((new Date(os.value)-new Date(pr.value))/864e5);lt.value=diff;lt.style.color=diff<0?'#b83232':'#1a3d2b';}
  else lt.value='';
}

function submitAdd(){
  const job=document.getElementById('nj-job').value.trim();
  const wo=document.getElementById('nj-wo').value.trim();
  if(!job&&!wo){showToast('Enter a Job # or WO #');return;}
const backlog=document.getElementById('nj-backlog').checked;
  const checked=Array.from(document.querySelectorAll('input[name="nj-wk"]:checked')).map(x=>parseInt(x.value));
  if(checked.length===0&&!backlog){showToast('Select at least one week, or mark as Backlog');return;}
  if(checked.length>0&&backlog){showToast('Pick weeks OR Backlog, not both');return;}

  const bh={};
  DEPTS.forEach(d=>{bh[d.key]=parseFloat(document.getElementById('nj-'+d.key).value)||0;});

  const id=Date.now().toString();
  const row={job,wo,lt:document.getElementById('nj-lt').value||'',prio:document.getElementById('nj-prio').value.trim(),
    pr:document.getElementById('nj-pr').value,os:document.getElementById('nj-os').value,
    out:parseFloat(document.getElementById('nj-out').value)||0,
    pow:parseFloat(document.getElementById('nj-pow').value)||0,
    mtlStatus:document.getElementById('nj-mtl').value||'',
    expArrival:document.getElementById('nj-ea').value||'',
    backlog:backlog,bh:bh,
    weeks:{}};
  checked.forEach(w=>{row.weeks[w]=true;});
  checked.forEach(w=>{
    DEPTS.forEach(d=>{
      row['h_'+d.key+'_'+w]=bh[d.key];
      row['s_'+d.key+'_'+w]='NOT STARTED';
    });
  });
  rows[id]=row;
  db.ref('rows/'+id).set(row);
  const where=checked.length?`${checked.length} week(s)`+(backlog?' + Backlog':''):'Backlog';
  showToast(`Job #${job||wo} added to ${where}`);
  renderPanels('add');
  renderPanels('add');
}

function renderJobsTab(){
  const arr=getRowsArray();
  const html=arr.length===0?'<p style="color:#888;font-size:12px;padding:12px 0;">No jobs on schedule.</p>'
    :arr.map(r=>{
      const wks=r.weeks?Object.keys(r.weeks).filter(k=>r.weeks[k]).join(', '):'—';
      return`<div class="jitem"><div><div class="jname">Job #${r.job||'—'}${r.backlog?' <span style="background:#5D4037;color:#fff;font-size:9px;padding:2px 6px;border-radius:3px;margin-left:4px">BACKLOG</span>':''}</div>
      <div class="jsub">WO# ${r.wo||'—'} · On Site: ${r.os||'—'} · Priority: ${r.prio||'—'}</div>
      <div class="jwks">Weeks: ${wks||'—'}</div></div>
      <div style="display:flex;gap:6px">
      <button class="btn btn-gmid" onclick="editJob('${r._id}')">Edit</button>
      <button class="btn btn-red" onclick="admDel('${r._id}')">Remove</button></div></div>`;

function admDel(id){
  const r=rows[id];if(!r)return;
  if(confirm(`Remove Job #${r.job||r.wo||'?'} from all weeks?`)){deleteRowFB(id);delete rows[id];renderAll();renderPanels('jobs');showToast('Job removed');}
}

function renderDeptTab(){
  const tbody=DEPTS.map(d=>{
    const ds=deptSettings[d.key]||{headcount:1,shift:8};
    return`<tr><td style="font-weight:700">${d.label}</td>
    <td><input type="number" id="ds-hc-${d.key}" min="0" value="${ds.headcount}" oninput="updDS('${d.key}')"></td>
    <td><div class="sbtns">
    <button class="sbtn ${ds.shift===8?'on':''}" id="ds-s8-${d.key}" onclick="setShift('${d.key}',8)">8</button>
    <button class="sbtn ${ds.shift===10?'on':''}" id="ds-s10-${d.key}" onclick="setShift('${d.key}',10)">10</button>
    <button class="sbtn ${ds.shift===12?'on':''}" id="ds-s12-${d.key}" onclick="setShift('${d.key}',12)">12</button>
    </div></td><td class="capdisplay" id="ds-cap-${d.key}">${deptCap(d.key)} hrs</td></tr>`;
  }).join('');

  <div style="margin-top:14px;text-align:right"><button class="btn btn-gmid" onclick="saveDeptBtn()">Save Dept Settings</button></div>`;
}

function setShift(key,val){deptSettings[key].shift=val;[8,10,12].forEach(v=>{const b=document.getElementById('ds-s'+v+'-'+key);if(b)b.classList.toggle('on',v===val);});refreshCapDisp(key);}
function updDS(key){const i=document.getElementById('ds-hc-'+key);if(i)deptSettings[key].headcount=parseInt(i.value)||0;refreshCapDisp(key);}
function refreshCapDisp(key){const el=document.getElementById('ds-cap-'+key);if(el)el.textContent=deptCap(key)+' hrs';}
function saveDeptBtn(){DEPTS.forEach(d=>{const i=document.getElementById('ds-hc-'+d.key);if(i)deptSettings[d.key].headcount=parseInt(i.value)||0;});saveDeptSettingsFB();renderAll();showToast('Dept settings saved');renderPanels('dept');}

// EDIT JOB

let editingId=null;

function editJob(id){
  editingId=id;
  const r=rows[id];if(!r)return;
  renderPanels('edit');
}

function renderEditTab(){
  const r=rows[editingId];
  if(!r){renderPanels('jobs');return;}
  const curWk=config.week||25;
  const wkStart=Math.max(1,curWk-1);
  const wkEnd=Math.min(52,curWk+6);
  const rowWeeks=r.weeks||{};
  let wkChecks='';
  // show all weeks this job is in PLUS the standard range
  const allWks=new Set();
  for(let w=wkStart;w<=wkEnd;w++)allWks.add(w);
  Object.keys(rowWeeks).forEach(k=>{if(rowWeeks[k])allWks.add(parseInt(k));});
  Array.from(allWks).sort((a,b)=>a-b).forEach(w=>{
    const checked=rowWeeks[w]?'checked':'';
   wkChecks+=`<label class="wk-check"><input type="checkbox" name="ej-wk" value="${w}" ${checked} onchange="if(this.checked){var b=document.getElementById('ej-backlog');if(b)b.checked=false;}"><span>Wk ${w}</span></label>`;
  });

  document.getElementById('tab-c').innerHTML=`
  <div style="background:var(--brand-lite);padding:10px 14px;border-radius:4px;margin-bottom:14px;font-size:12px;color:var(--gdark);font-weight:700;">
    Editing Job #${r.job||'—'} · WO# ${r.wo||'—'}
  </div>
  <div class="fg">
    <div class="fr"><label>Job #</label><input type="text" id="ej-job" value="${r.job||''}"></div>
    <div class="fr"><label>WO #</label><input type="text" id="ej-wo" value="${r.wo||''}"></div>
    <div class="fr"><label>Lead Time (days) — auto</label><input type="text" id="ej-lt" value="${r.lt||''}" readonly style="background:#f0f0f0;color:#666;cursor:default;"></div>
    <div class="fr"><label>Priority</label><input type="text" id="ej-prio" value="${r.prio||''}"></div>
    <div class="fr"><label>Prod. Release Date</label><input type="date" id="ej-pr" value="${r.pr||''}" oninput="calcEditLT()"></div>
    <div class="fr"><label>On Site Date</label><input type="date" id="ej-os" value="${r.os||''}" oninput="calcEditLT()"></div>
  </div>
  <div class="fg" style="margin-top:12px">
    <div class="fr"><label>Material Status</label>
      <select id="ej-mtl"><option value="" ${!r.mtlStatus?'selected':''}>— Select —</option><option value="FINAL MTO" ${r.mtlStatus==='FINAL MTO'?'selected':''}>FINAL MTO</option><option value="WAITING ON MATERIAL" ${r.mtlStatus==='WAITING ON MATERIAL'?'selected':''}>WAITING ON MATERIAL</option><option value="SHOP" ${r.mtlStatus==='SHOP'?'selected':''}>SHOP</option></select>
    </div>
    <div class="fr"><label>Expected Arrival</label><input type="date" id="ej-ea" value="${r.expArrival||''}"></div>
  </div>
<div class="fsec">Backlog</div>
  <label class="wk-check" style="width:auto"><input type="checkbox" id="ej-backlog" ${r.backlog?'checked':''} onchange="if(this.checked)document.querySelectorAll('input[name=ej-wk]').forEach(c=>c.checked=false)"><span>Hold in Backlog — clears week selection (one or the other)</span></label>
  <div class="fsec">Assign to Week(s)</div>
  <p style="font-size:11px;color:var(--grey3);margin-bottom:6px">Check a week to release this job into it (hours below are applied). Unchecking removes it from that week.</p>
  <div class="wk-assign">${wkChecks}</div>
  <div class="fsec">Department Hours (updates all checked weeks)</div>
  <div class="dhg">${DEPTS.map(d=>{
    // get hours from the first active week as default
    const firstWk=Object.keys(rowWeeks).find(k=>rowWeeks[k]);
    const hrs=firstWk?(r['h_'+d.key+'_'+firstWk]||0):((r.bh&&r.bh[d.key])||0);
    return '<div class="fr"><label>'+d.label+'</label><input type="number" id="ej-'+d.key+'" min="0" step="0.1" value="'+hrs+'"></div>';
  }).join('')}</div>
  <div class="fsec">Outsourced Work (Dollar Values)</div>
  <div class="dhg" style="grid-template-columns:1fr 1fr">
    ${DOLLAR_DEPTS.map(d=>'<div class="fr"><label>'+d.label+'</label><input type="number" id="ej-'+d.key+'" min="0" step="0.01" value="'+(r[d.key]||0)+'"></div>').join('')}
  </div>
  <div class="factions">
    <button class="btn" style="background:#eee;color:#555" onclick="renderPanels('jobs')">Cancel</button>
    <button class="btn btn-gmid" onclick="saveEdit()">Save Changes</button>
  </div>`;
}

function calcEditLT(){
  const pr=document.getElementById('ej-pr'),os=document.getElementById('ej-os'),lt=document.getElementById('ej-lt');
  if(!pr||!os||!lt)return;
  if(pr.value&&os.value){const diff=Math.round((new Date(os.value)-new Date(pr.value))/864e5);lt.value=diff;lt.style.color=diff<0?'#b83232':'#1a3d2b';}
  else lt.value='';
}

function saveEdit(){
  if(!editingId||!rows[editingId])return;
  const r=rows[editingId];

  const backlog=document.getElementById('ej-backlog').checked;
  const checked=Array.from(document.querySelectorAll('input[name="ej-wk"]:checked')).map(x=>parseInt(x.value));
  if(checked.length===0&&!backlog){showToast('Check a week, or keep it in Backlog');return;}
  if(checked.length>0&&backlog){showToast('Pick weeks OR Backlog, not both');return;}
  r.backlog=backlog;
  r.bh=r.bh||{};
  DEPTS.forEach(d=>{r.bh[d.key]=parseFloat(document.getElementById('ej-'+d.key).value)||0;});

  // update info fields
  r.job=document.getElementById('ej-job').value.trim();
  r.wo=document.getElementById('ej-wo').value.trim();
  r.lt=document.getElementById('ej-lt').value||'';
  r.prio=document.getElementById('ej-prio').value.trim();
  r.pr=document.getElementById('ej-pr').value;
  r.os=document.getElementById('ej-os').value;
  r.out=parseFloat(document.getElementById('ej-out').value)||0;
  r.pow=parseFloat(document.getElementById('ej-pow').value)||0;
  r.mtlStatus=document.getElementById('ej-mtl').value||'';
  r.expArrival=document.getElementById('ej-ea').value||'';

  // update weeks
  // update weeks
  const oldWeeks=r.weeks||{};
  const newWeeks={};

  checked.forEach(w=>{
    newWeeks[w]=true;
    // update hours for all checked weeks
    DEPTS.forEach(d=>{
      r['h_'+d.key+'_'+w]=r.bh[d.key];
      // preserve existing status, default to NOT STARTED for new weeks
      if(!r['s_'+d.key+'_'+w])r['s_'+d.key+'_'+w]='NOT STARTED';
    });
  });

  // clean up unchecked weeks
  Object.keys(oldWeeks).forEach(w=>{
    if(!newWeeks[w]){
      delete r.weeks[w];
      DEPTS.forEach(d=>{delete r['s_'+d.key+'_'+w];delete r['h_'+d.key+'_'+w];});
    }
  });

  r.weeks=newWeeks;
  db.ref('rows/'+editingId).set(r);
  showToast('Job #'+(r.job||r.wo)+' updated');
  editingId=null;
  renderPanels('jobs');
}

// WEEKS CONFIG TAB
// ══════════════════════════════════════════════════
function renderWeeksTab(){
  const curWk=config.week||25;
  const wkStart=Math.max(1,curWk-1);
  const wkEnd=Math.min(52,curWk+8);
  let tbody='';
  for(let w=wkStart;w<=wkEnd;w++){
    const wc=getWeekConfig(w);
    const jobCount=getRowsArray().filter(r=>r.weeks&&r.weeks[w]).length;
    const isCurrent=w===curWk;
    tbody+='<tr'+(isCurrent?' style="background:var(--brand-lite)"':'')+'>';
    tbody+='<td style="font-weight:700;padding:7px 8px">Week '+w+(isCurrent?' <span style="font-size:9px;color:var(--gmid)">(CURRENT)</span>':'')+'</td>';
    tbody+='<td style="padding:7px 8px"><div class="day-grp">';
    [3,4,5,6].forEach(d=>{
      tbody+='<button class="day-btn '+(wc.days===d?'on':'')+'" onclick="setWkDays('+w+','+d+')">'+d+'</button>';
    });
    tbody+='</div></td>';
    tbody+='<td style="padding:7px 8px"><div class="sbtns">';
    [8,10,12].forEach(s=>{
      tbody+='<button class="sbtn '+(wc.shift===s?'on':'')+'" onclick="setWkShift('+w+','+s+')">'+s+'</button>';
    });
    tbody+='</div></td>';
    tbody+='<td style="padding:7px 8px;color:var(--gmid);font-weight:700">'+jobCount+' jobs</td>';
    tbody+='</tr>';
  }

  document.getElementById('tab-c').innerHTML=
    '<p style="font-size:11px;color:#888;margin-bottom:12px">Set days worked and shift hours for each week independently. Capacity = Headcount (from Dept Setup) x Shift Hours x Days Worked.</p>'+
    '<table class="dtbl"><thead><tr><th>Week</th><th>Days Worked</th><th>Shift (hrs/day)</th><th>Jobs</th></tr></thead>'+
    '<tbody>'+tbody+'</tbody></table>';
}

function setWkDays(wkNum,days){
  const wc=getWeekConfig(wkNum);
  wc.days=days;
  weekConfigs[wkNum]=wc;
  db.ref('weekConfigs/'+wkNum).set(wc);
  if(wkNum===config.week){config.days=days;setDayBtns(days);saveConfig();}
  renderWeeksTab();renderCapStrip();renderMain();
}

function setWkShift(wkNum,shift){
  const wc=getWeekConfig(wkNum);
  wc.shift=shift;
  weekConfigs[wkNum]=wc;
  db.ref('weekConfigs/'+wkNum).set(wc);
  renderWeeksTab();renderCapStrip();renderMain();
}

function fmt(n){if(typeof n!=='number')n=parseFloat(n)||0;return n%1===0?n:parseFloat(n.toFixed(1));}
